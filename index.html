<body>
    <div>
        <div class="sidebar">
           
            <div id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)"> 
                Zoom no canvas:
                <button onclick="zoom(0.1);">+</button>
                <button onclick="zoom(-0.1);">-</button>
                Zoom no conteúdo:
                <button onclick="escala(0.1);">+</button>
                <button onclick="escala(-0.1);">-</button>
                <canvas id="myCanvas" width="1000", height="500"><p>Queria que funcionasse</p></canvas>
            </div>
        </div>
    </div>
   
<script src="index.js"></script>
</body>
